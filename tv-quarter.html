<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TV Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#F0EDE6;font-family:'Heebo',sans-serif;direction:rtl;overflow:hidden}

    .root{display:grid;grid-template-rows:28px 1fr 1fr 1fr 1fr 1fr 1fr;height:100vh;width:100vw}
    .panel{user-select:none}
    .panel-btns{display:flex;gap:3px;align-items:center}
    .pbtn{width:18px;height:18px;border-radius:4px;border:none;background:#F0EDE6;color:#888;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
    .pbtn:hover{background:#E8E4DC;color:#1A1A1A}

    /* HEADER */
    .header{
      background:#1A1A1A;
      padding:0 12px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .header-title{font-size:11px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px}
    .blink{width:5px;height:5px;border-radius:50%;background:#3DB870;animation:blink 2s infinite;flex-shrink:0}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .header-meta{font-size:9px;color:#888;display:flex;align-items:center;gap:8px}

    /* PANEL */
    .panel{background:#fff;display:flex;flex-direction:column;overflow:hidden;border-bottom:1px solid #E8E4DC;margin:4px 4px 0}
    .panel:last-child{margin-bottom:4px}
    .panel{border-radius:10px;border:1px solid #E8E4DC;box-shadow:0 1px 4px rgba(0,0,0,.05)}

    .panel-header{
      background:#FAFAF8;
      padding:4px 10px;
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
      border-bottom:1px solid #F0EDE6;
      border-radius:10px 10px 0 0;
    }
    .panel-label{font-size:9px;font-weight:700;color:#AAA49C;letter-spacing:.8px;text-transform:uppercase}
    .panel-total{font-size:9px;color:#AAA49C;display:flex;gap:10px}
    .panel-total b{color:#1A1A1A;font-size:12px;font-weight:900}

    /* TABLE */
    .tbl-wrap{flex:1;overflow-y:auto;overflow-x:hidden;background:#fff}
    .tbl-wrap::-webkit-scrollbar{width:2px}
    .tbl-wrap::-webkit-scrollbar-thumb{background:#E8E4DC;border-radius:2px}
    .tbl{width:100%;border-collapse:collapse}

    /* FREEFIT rows */
    .ff-row td{padding:2.5px 10px;border-bottom:1px solid #F8F6F2;vertical-align:middle}
    .ff-row:last-child td{border-bottom:none}
    .ff-row:hover td{background:#FAFAF8}
    .ff-name{font-size:12px;font-weight:700;color:#1A1A1A;white-space:nowrap}
    .ff-sales{font-size:16px;font-weight:900;letter-spacing:-1px;width:32px;text-align:center}
    .ff-calls{font-size:10px;color:#C0BDB6;width:42px;text-align:center;white-space:nowrap}

    .green{color:#16A34A}
    .gray{color:#D0CCC6}
    .orange{color:#D97706}
    .red{color:#DC2626}

    /* total row */
    .ff-total td{padding:3px 10px;border-top:1.5px solid #F0EDE6;background:#FAFAF8}
    .ff-total .ff-name{color:#888;font-size:10px;font-weight:700;letter-spacing:.5px}
    .ff-total .ff-sales{font-size:15px;color:#1A1A1A}
    .ff-total .ff-calls{color:#C0BDB6}

    /* YIRUTIM rows */
    .yr-row td{padding:2.5px 10px;border-bottom:1px solid #F8F6F2;vertical-align:middle}
    .yr-row:last-child td{border-bottom:none}
    .yr-row:hover td{background:#FAFAF8}
    .yr-name{font-size:12px;font-weight:700;color:#1A1A1A;white-space:nowrap}
    .yr-count{font-size:16px;font-weight:900;width:32px;text-align:center;letter-spacing:-1px}
    .yr-age{width:54px;text-align:center}

    .chip{font-size:8px;font-weight:700;padding:1px 5px;border-radius:999px;display:inline-block}
    .chip.ok{background:#DCFCE7;color:#166534}
    .chip.warn{background:#FEF9C3;color:#854D0E}
    .chip.urgent{background:#FEE2E2;color:#991B1B}

    /* EMAIL rows */
    .em-row td{padding:2.5px 10px;border-bottom:1px solid #F8F6F2;vertical-align:middle}
    .em-row:last-child td{border-bottom:none}
    .em-row:hover td{background:#FAFAF8}
    .em-name{font-size:12px;font-weight:700;color:#1A1A1A;white-space:nowrap}
    .em-count{font-size:16px;font-weight:900;width:32px;text-align:center;letter-spacing:-1px}
    .em-sla{width:52px;text-align:center}
    .sla-chip{font-size:8px;font-weight:700;padding:1px 5px;border-radius:999px;display:inline-block}
    .sla-green {background:#DCFCE7;color:#166534}
    .sla-yellow{background:#FEF9C3;color:#854D0E}
    .sla-orange{background:#FFEDD5;color:#9A3412}
    .sla-red   {background:#FEE2E2;color:#991B1B}

    .loading{text-align:center;color:#C0BDB6;padding:8px;font-size:10px}
  </style>
</head>
<body>
<div class="root" id="rootGrid">

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">
      <div class="blink"></div>דשבורד מרכז אדיר
    </div>
    <div class="header-meta">
      <span id="hDate"></span>
      <span>⟳ <span id="cd">60</span>ש׳</span>
    </div>
  </div>

  <!-- FREEFIT -->
  <div class="panel" id="ffPanel">
    <div class="panel-header">
      <div class="panel-label">📊 FREEFIT — מכירות היום</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="panel-total">מכירות <b id="tSales">—</b> &nbsp; שיחות <b id="tCalls">—</b></div>
        <div class="panel-btns">
          <button class="pbtn" onclick="resizePanel('ffPanel',1)" title="הגדל">+</button>
          <button class="pbtn" onclick="resizePanel('ffPanel',-1)" title="הקטן">−</button>
        </div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <tbody id="ffBody"><tr><td colspan="3" class="loading">טוען...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- YIRUTIM -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">🛡️ יירוטים — ממתינים לטיפול</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="panel-total">ממתינים <b id="tWait">—</b></div>
        <div class="panel-btns">
          <button class="pbtn" onclick="resizePanel('yrPanel',1)" title="הגדל">+</button>
          <button class="pbtn" onclick="resizePanel('yrPanel',-1)" title="הקטן">−</button>
        </div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <tbody id="yrBody"><tr><td colspan="3" class="loading">טוען...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- EMAILS -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">✉️ אימיילים — טיקטים פתוחים</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="panel-total">פתוחים <b id="tEmailOpen">—</b> &nbsp; קריטי <b id="tEmailCrit" style="color:#DC2626">—</b></div>
        <div class="panel-btns">
          <button class="pbtn" onclick="resizePanel('emPanel',1)" title="הגדל">+</button>
          <button class="pbtn" onclick="resizePanel('emPanel',-1)" title="הקטן">−</button>
        </div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <tbody id="emBody"><tr><td colspan="3" class="loading">טוען...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- TAQAN -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">⏱️ תקינה יומית</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="panel-total">פעילויות</div>
        <div class="panel-btns">
          <button class="pbtn" onclick="resizePanel('tqPanel',1)" title="הגדל">+</button>
          <button class="pbtn" onclick="resizePanel('tqPanel',-1)" title="הקטן">−</button>
        </div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl" style="table-layout:fixed;width:100%">
        <colgroup><col style="width:38%"/><col style="width:62%"/></colgroup>
        <tbody id="tqBody"><tr><td colspan="3" class="loading">טוען...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- MANAGER CALLS -->
  <div class="panel" id="mcPanel">
    <div class="panel-header">
      <div class="panel-label">📞 שיחות מנהל — מובמנט</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="panel-total">חריגה מעל 2 ימי עסקים</div>
        <div class="panel-btns">
          <button class="pbtn" onclick="resizePanel('mcPanel',1)" title="הגדל">+</button>
          <button class="pbtn" onclick="resizePanel('mcPanel',-1)" title="הקטן">−</button>
        </div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <tbody id="mcBody"><tr><td colspan="3" class="loading">טוען...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- CHECKLIST OVERDUE -->
  <div class="panel" id="clPanel">
    <div class="panel-header">
      <div class="panel-label">⚠️ צ'ק ליסט — חריגות מנהלים</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="panel-total" id="tvClTime"></div>
        <div class="panel-btns">
          <button class="pbtn" onclick="resizePanel('clPanel',1)" title="הגדל">+</button>
          <button class="pbtn" onclick="resizePanel('clPanel',-1)" title="הקטן">−</button>
        </div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <tbody id="clOverdueBody"><tr><td colspan="3" class="loading">טוען...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>
<script>
  const Y_URL='https://qyqkimpaffhizouuwdko.supabase.co/rest/v1';
  const Y_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5cWtpbXBhZmZoaXpvdXV3ZGtvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODUxMzUsImV4cCI6MjA5NDg2MTEzNX0.zlIo9vTfWKhpSHeTHqRExTnWtAuJLsZjK_Hlii1Oa_c';
  const F_URL='https://fmejfxejsrmjvexfizgj.supabase.co/rest/v1';
  const F_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtZWpmeGVqc3JtanZleGZpemdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjA1MjQsImV4cCI6MjA5MTkzNjUyNH0.A8Eu-3Uj-i06U0DsDt-pbGu1tQJXdjZaTyz797PsOEU';
  const H=k=>({'apikey':k,'Authorization':'Bearer '+k});

  function updateDate(){
    const n=new Date();
    const days=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
    const months=['ינו','פבר','מרץ','אפר','מאי','יוני','יולי','אוג','ספט','אוק','נוב','דצמ'];
    document.getElementById('hDate').textContent='יום '+days[n.getDay()]+' '+n.getDate()+' '+months[n.getMonth()];
  }

  function daysAgo(d){
    if(!d)return null;
    const diff=Math.floor((Date.now()-new Date(d))/(864e5));
    if(diff===0)return{l:'היום',c:'ok'};
    if(diff===1)return{l:'אתמול',c:'warn'};
    if(diff<=3) return{l:diff+' ימים',c:'warn'};
    return{l:diff+' ימים',c:'urgent'};
  }

  async function loadFF(){
    try{
      const _now=new Date(); const today=new Date(_now.getTime()+3*60*60*1000).toISOString().slice(0,10);
      const r=await fetch(F_URL+'/daily_stats?select=agent_name,total_sales,calls,date&order=total_sales.desc',{headers:H(F_KEY)});
      const allD=await r.json();
      // סנן בצד הלקוח לתאריך היום בלבד — הגנה כפולה
      const d=Array.isArray(allD)?allD.filter(x=>x.date===today):[];
      if(!d.length){
        document.getElementById('ffBody').innerHTML=`<tr><td colspan="3" class="loading" style="color:#D97706;font-weight:700">⏳ אין נתוני מכירות להיום עדיין<br/><span style="font-size:10px;color:#AAA;font-weight:400">(${today})</span></td></tr>`;
        document.getElementById('tSales').textContent='0';
        document.getElementById('tCalls').textContent='0';
        return;
      }
      const tS=d.reduce((s,x)=>s+(x.total_sales||0),0);
      const tC=d.reduce((s,x)=>s+(x.calls||0),0);
      document.getElementById('tSales').textContent=tS;
      document.getElementById('tCalls').textContent=tC;

      let html=d.map(x=>{
        const s=x.total_sales||0,c=x.calls||0;
        return`<tr class="ff-row">
          <td class="ff-name">${x.agent_name||'—'}</td>
          <td class="ff-sales ${s>0?'green':'gray'}">${s}</td>
          <td class="ff-calls">${c} שיחות</td>
        </tr>`;
      }).join('');
      html+=`<tr class="ff-total">
        <td class="ff-name">סה״כ</td>
        <td class="ff-sales green">${tS}</td>
        <td class="ff-calls">${tC} שיחות</td>
      </tr>`;
      document.getElementById('ffBody').innerHTML=html;
    }catch(e){
      document.getElementById('ffBody').innerHTML='<tr><td colspan="3" class="loading">שגיאה</td></tr>';
    }
  }

  async function loadYR(){
    try{
      // סנן ישירות בשרת רק טרם טופל — פותר בעיית הגבלת 1000 שורות
      const r=await fetch(Y_URL+'/yirutim?select=activity,created_at&status=eq.טרם טופל&order=created_at.asc',{
        headers:{...H(Y_KEY),'Range-Unit':'items','Range':'0-4999'}
      });
      const d=await r.json();
      if(!Array.isArray(d)||!d.length){
        document.getElementById('yrBody').innerHTML='<tr><td colspan="3" class="loading">אין ממתינים</td></tr>';
        document.getElementById('tWait').textContent='0';
        return;
      }
      const g={};
      d.forEach(x=>{
        const a=x.activity||'—';
        if(!g[a])g[a]={w:0,oldestWaiting:null};
        g[a].w++;
        if(!g[a].oldestWaiting||x.created_at<g[a].oldestWaiting)g[a].oldestWaiting=x.created_at;
      });
      document.getElementById('tWait').textContent=d.length;
      const sorted=Object.entries(g).sort((a,b)=>b[1].w-a[1].w);
      document.getElementById('yrBody').innerHTML=sorted.map(([act,x])=>{
        const age=daysAgo(x.oldestWaiting);
        const urgent=age&&age.c==='urgent';
        const wc=x.w>0?(urgent?'red':'orange'):'gray';
        return`<tr class="yr-row">
          <td class="yr-name" style="${urgent?'color:#DC2626':''}">${act}</td>
          <td class="yr-count ${wc}">${x.w}</td>
          <td class="yr-age">${age?`<span class="chip ${age.c}">${age.l}</span>`:''}</td>
        </tr>`;
      }).join('');
    }catch(e){
      document.getElementById('yrBody').innerHTML='<tr><td colspan="3" class="loading">שגיאה</td></tr>';
    }
  }

  async function loadEmails(){
    try{
      const res=await fetch('https://crm-movement.vercel.app/api/glassix-refresh',{});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const data=await res.json();
      const depts=(data.departments||[]).filter(d=>d.name!=='לא ידוע');
      const summary=data.summary||{};
      document.getElementById('tEmailOpen').textContent=summary.total_open??'0';
      document.getElementById('tEmailCrit').textContent=summary.critical??'0';
      if(!depts.length){
        document.getElementById('emBody').innerHTML='<tr><td colspan="3" class="loading">אין נתונים</td></tr>';
        return;
      }
      const slaOrder={red:0,orange:1,yellow:2,green:3};
      depts.sort((a,b)=>(slaOrder[a.sla_status]??9)-(slaOrder[b.sla_status]??9));
      document.getElementById('emBody').innerHTML=depts.map(d=>{
        const sla=d.sla_status||'green';
        const wc=d.open_tickets>0?(sla==='red'?'red':sla==='orange'?'orange':'green'):'gray';
        const days=d.oldest_business_days??0;
        let ageLabel='';
        if(d.open_tickets>0){
          if(days===0) ageLabel='היום';
          else if(days===1) ageLabel='אתמול';
          else if(days===2) ageLabel='שלשום';
          else ageLabel=days+' ימים';
        }
        return`<tr class="em-row">
          <td class="em-name">${d.name}</td>
          <td class="em-count ${wc}">${d.open_tickets}</td>
          <td class="em-sla">${ageLabel?`<span class="sla-chip sla-${sla}" style="font-size:8px">${ageLabel}</span>`:''}</td>
        </tr>`;
      }).join('');
    }catch(e){
      document.getElementById('emBody').innerHTML='<tr><td colspan="3" class="loading">שגיאה: '+e.message+'</td></tr>';
    }
  }

  async function loadTaqan(){
    try{
      const _n=new Date(); const today=new Date(_n.getTime()+3*60*60*1000).toISOString().slice(0,10);
      const r=await fetch(Y_URL+'/work_hours?select=activity,hours,updated_by,updated_at&work_date=eq.'+today,{headers:H(Y_KEY)});
      const d=await r.json();
      const g={};
      if(Array.isArray(d)) d.forEach(x=>{
        const a=x.activity||'—';
        if(!g[a])g[a]={hours:0,updated_by:null,updated_at:null};
        g[a].hours+=parseFloat(x.hours)||0;
        if(x.updated_at&&(!g[a].updated_at||x.updated_at>g[a].updated_at)){g[a].updated_at=x.updated_at;g[a].updated_by=x.updated_by;}
      });
      const DIVS={מובמנט:9,מאוחדת:7,'פריפיט שירות':9,'פריפיט מכירות':9};
      const order=['מובמנט','מאוחדת','פריפיט שירות','פריפיט מכירות'];
      let html='';
      order.forEach((act)=>{
        const ag=g[act];
        if(!ag){
          html+=`<tr class="ff-row">
            <td class="ff-name" style="width:35%">${act}</td>
            <td style="width:65%;direction:ltr;text-align:left">
              <span style="font-size:10px;font-weight:700;color:#AAA;background:#F8F6F2;padding:2px 8px;border-radius:6px">טרם נשלח</span>
            </td>
          </tr>`;
          return;
        }
        const div=DIVS[act]||9;
        const tq=(ag.hours/div).toFixed(2);
        const tn=parseFloat(tq);
        const c=tn>=1?'#16A34A':tn>=0.8?'#D97706':'#DC2626';
        const bg=tn>=1?'#DCFCE7':tn>=0.8?'#FEF9C3':'#FEE2E2';
        html+=`<tr class="ff-row">
          <td class="ff-name" style="width:35%">${act}</td>
          <td style="width:65%;direction:ltr;text-align:left">
            <div style="display:inline-flex;align-items:center;gap:6px">
              <span style="font-size:13px;font-weight:900;color:${c};background:${bg};padding:2px 7px;border-radius:6px;flex-shrink:0">${tq}</span>
              <div style="font-size:9px;color:#888;line-height:1.4;direction:rtl;text-align:right"><div style="font-weight:700;color:#555">${ag.updated_by||'—'}</div><div>${ag.updated_at?new Date(ag.updated_at).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—'}</div></div>
            </div>
          </td>
        </tr>`;
        if(act==='מאוחדת'){
          const mH=g['מובמנט']?.hours||0, meH=g['מאוחדת']?.hours||0;
          const tot=((mH/9)+(meH/7)).toFixed(2);
          const tn2=parseFloat(tot);
          const c2=tn2>=1.8?'#16A34A':tn2>=1.4?'#D97706':'#DC2626';
          const bg2=tn2>=1.8?'#DCFCE7':tn2>=1.4?'#FEF9C3':'#FEE2E2';
          html+=`<tr style="background:#F8F6F2;border-top:1px solid #E8E4DC">
            <td class="ff-name" style="font-size:10px;color:#888;width:38%">סה״כ</td>
            <td style="width:62%;direction:ltr;text-align:left">
              <span style="font-size:13px;font-weight:900;color:${c2};background:${bg2};padding:2px 7px;border-radius:6px">${tot}</span>
            </td>
          </tr>`;
        }
      });
      document.getElementById('tqBody').innerHTML=html||'<tr><td colspan="2" class="loading">אין</td></tr>';
    }catch(e){
      document.getElementById('tqBody').innerHTML='<tr><td colspan="2" class="loading">שגיאה</td></tr>';
    }
  }

  async function loadManagerCalls(){
    try{
      const n=new Date();
      const today=(n.getHours()<6?new Date(n.getTime()-864e5):n).toISOString().slice(0,10);
      const r=await fetch(Y_URL+'/manager_calls?select=*&work_date=eq.'+today,{headers:H(Y_KEY)});
      const d=await r.json();
      if(!Array.isArray(d)||!d.length){
        document.getElementById('mcBody').innerHTML='<tr><td colspan="3" class="loading">אין נתונים להיום</td></tr>';
        return;
      }
      const rec=d[0];
      const t=rec.updated_at?new Date(rec.updated_at).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
      document.getElementById('mcBody').innerHTML=`
        <tr class="ff-row">
          <td class="ff-name">שיחות מנהל בחריגה</td>
          <td style="direction:ltr;text-align:left">
            <div style="display:inline-flex;align-items:flex-start;gap:8px">
              <div>
                <div style="font-size:20px;font-weight:900;color:#DC2626;background:#FEE2E2;padding:2px 10px;border-radius:8px;display:inline-block">${rec.calls_overdue??0}</div>
                <div style="font-size:9px;color:#888;margin-top:2px">${rec.calls_oldest_date?new Date(rec.calls_oldest_date+'T12:00:00').toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}):'—'}</div>
              </div>
              <div style="font-size:9px;color:#888;line-height:1.4;direction:rtl;text-align:right">
                <div style="font-weight:700;color:#555">${rec.updated_by||'—'}</div>
                <div>${t}</div>
              </div>
            </div>
          </td>
        </tr>
        <tr class="ff-row">
          <td class="ff-name">בטיפול לאחר שיחה</td>
          <td style="direction:ltr;text-align:left">
            <div style="display:inline-flex;align-items:flex-start;gap:8px">
              <div>
                <div style="font-size:20px;font-weight:900;color:#D97706;background:#FEF9C3;padding:2px 10px;border-radius:8px;display:inline-block">${rec.in_treatment_overdue??0}</div>
                <div style="font-size:9px;color:#888;margin-top:2px">${rec.treatment_oldest_date?new Date(rec.treatment_oldest_date+'T12:00:00').toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}):'—'}</div>
              </div>
              <div style="font-size:9px;color:#888;line-height:1.4;direction:rtl;text-align:right">
                <div style="font-weight:700;color:#555">${rec.updated_by||'—'}</div>
                <div>${t}</div>
              </div>
            </div>
          </td>
        </tr>`;
    }catch(e){
      document.getElementById('mcBody').innerHTML='<tr><td colspan="3" class="loading">שגיאה</td></tr>';
    }
  }

  async function loadClOverdue(){
    try{
      const now=new Date();
      const today=new Date(now.getTime()+3*60*60*1000).toISOString().slice(0,10);
      const nowMin=now.getHours()*60+now.getMinutes();
      const dow=now.getDay();
      document.getElementById('tvClTime').textContent=now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
      // שלוף כל המנהלים
      const mgrs=await fetch(Y_URL+'/managers?select=name&order=name.asc',{headers:H(Y_KEY)}).then(r=>r.json());
      if(!Array.isArray(mgrs)||!mgrs.length){
        document.getElementById('clOverdueBody').innerHTML='<tr><td colspan="3" class="loading">אין מנהלים</td></tr>';
        return;
      }
      let html='';
      for(const mgr of mgrs){
        const items=await fetch(Y_URL+'/checklist_items?select=*&manager_name=eq.'+encodeURIComponent(mgr.name)+'&active=eq.true',{headers:H(Y_KEY)}).then(r=>r.json());
        const filtered=Array.isArray(items)?items.filter(i=>(i.day_of_week===null||i.day_of_week===dow)&&i.task_time&&dow!==5&&dow!==6):[];
        if(!filtered.length) continue;
        const comps=await fetch(Y_URL+'/checklist_completions?select=item_id&manager_name=eq.'+encodeURIComponent(mgr.name)+'&work_date=eq.'+today,{headers:H(Y_KEY)}).then(r=>r.json());
        const doneSet=new Set(Array.isArray(comps)?comps.map(c=>c.item_id):[]);
        const overdue=filtered.filter(i=>{
          if(doneSet.has(i.id)) return false;
          const[h,m]=(i.task_time+':00').split(':');
          return parseInt(h)*60+parseInt(m)<=nowMin;
        });
        if(!overdue.length) continue;
        const oldest=overdue.reduce((a,b)=>a.task_time<b.task_time?a:b);
        const[oh,om]=(oldest.task_time+':00').split(':');
        const diffMin=nowMin-(parseInt(oh)*60+parseInt(om));
        const diffStr=diffMin>=60?`${Math.floor(diffMin/60)}ש׳${diffMin%60?` ${diffMin%60}ד׳`:''}`:diffMin+'ד׳';
        html+=`<tr class="ff-row">
          <td class="ff-name" style="color:#DC2626;font-weight:700">${mgr.name}</td>
          <td><span style="font-size:16px;font-weight:900;color:#DC2626;background:#FEE2E2;padding:2px 8px;border-radius:6px">${overdue.length}</span></td>
          <td style="font-size:9px;color:#888;direction:rtl">${oldest.task_time}<br/><span style="color:#DC2626;font-weight:700">${diffStr} בחריגה</span></td>
        </tr>`;
      }
      document.getElementById('clOverdueBody').innerHTML=html||'<tr><td colspan="3" class="loading" style="color:#16A34A">✓ אין חריגות</td></tr>';
    }catch(e){
      document.getElementById('clOverdueBody').innerHTML='<tr><td colspan="3" class="loading">שגיאה</td></tr>';
    }
  }

  function loadAll(){loadFF();loadYR();loadTaqan();loadManagerCalls();loadClOverdue();}
  function loadAllWithEmails(){loadFF();loadYR();loadEmails();loadTaqan();loadManagerCalls();loadClOverdue();}

  let cd=600; // 10 דקות
  setInterval(()=>{
    cd--;document.getElementById('cd').textContent=cd;
    if(cd<=0){cd=600;loadAll();}
  },1000);
  // אימיילים כל 5 דקות
  setInterval(()=>{ loadEmails(); }, 5*60*1000);
  updateDate();setInterval(updateDate,60000);
  loadAllWithEmails();

  // ── Panel resize +/- ──
  const PANEL_IDS=['ffPanel','yrPanel','emPanel','tqPanel','mcPanel'];
  const panelSizes={ffPanel:1,yrPanel:1,emPanel:1,tqPanel:1,mcPanel:1};

  function applyPanelSizes(){
    const root=document.getElementById('rootGrid');
    root.style.gridTemplateRows='28px '+PANEL_IDS.map(id=>panelSizes[id]+'fr').join(' ');
  }

  function resizePanel(id,dir){
    const step=0.5;
    const min=0.3;
    const max=3;
    panelSizes[id]=Math.max(min,Math.min(max,+(panelSizes[id]+dir*step).toFixed(1)));
    applyPanelSizes();
  }
</script>
