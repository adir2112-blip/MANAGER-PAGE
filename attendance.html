<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ניהול נציגים — אדיר לוי</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Heebo',sans-serif;direction:rtl;background:#F0EDE6;min-height:100vh}

    /* ══ LOGIN ══ */
    .login-overlay{position:fixed;inset:0;background:#F0EDE6;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem}
    .login-overlay.hidden{display:none}
    .login-box{background:#fff;border:1px solid #E8E4DC;border-radius:20px;padding:2.2rem 2rem;width:340px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
    .login-logo{width:52px;height:52px;background:#1A1A1A;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
    .login-logo svg{width:26px;height:26px}
    .login-title{text-align:center;font-size:18px;font-weight:800;color:#1A1A1A;margin-bottom:4px}
    .login-sub{text-align:center;font-size:12.5px;color:#AAA;margin-bottom:1.4rem}
    .manager-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.2rem}
    .manager-btn{background:#FAFAF8;border:1.5px solid #E8E4DC;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:700;color:#1A1A1A;cursor:pointer;font-family:'Heebo',sans-serif;text-align:right;transition:all .18s;display:flex;align-items:center;justify-content:space-between}
    .manager-btn:hover{background:#F0EDE6;border-color:#C8C4BC}
    .manager-btn.selected{background:#1A1A1A;color:#fff;border-color:#1A1A1A}
    .manager-btn .act-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:#F0EDE6;color:#888}
    .manager-btn.selected .act-tag{background:#333;color:#aaa}
    .pin-wrap{position:relative;margin-bottom:.8rem}
    .pin-input{width:100%;background:#FAFAF8;border:1.5px solid #E8E4DC;border-radius:12px;padding:12px 16px;font-size:18px;letter-spacing:6px;text-align:center;font-family:'Heebo',sans-serif;color:#1A1A1A;outline:none;transition:border-color .2s}
    .pin-input:focus{border-color:#1A1A1A}
    .pin-input.error{border-color:#EF4444;animation:shake .3s}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
    .login-btn{width:100%;background:#1A1A1A;color:#fff;border:none;border-radius:12px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;transition:background .18s}
    .login-btn:hover{background:#333}
    .login-error{text-align:center;font-size:12px;color:#EF4444;min-height:18px}

    /* ══ HEADER ══ */
    .header{background:#1A1A1A;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
    .header-brand{display:flex;align-items:center;gap:12px}
    .header-logo{width:40px;height:40px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center}
    .header-logo svg{width:20px;height:20px}
    .header-title{font-size:17px;font-weight:800;color:#fff}
    .header-sub{font-size:11px;color:#666;margin-top:1px}
    .header-right{display:flex;align-items:center;gap:.75rem}
    .header-manager{font-size:12.5px;color:#aaa;display:flex;align-items:center;gap:6px}
    .dot-green{width:6px;height:6px;border-radius:50%;background:#3DB870;animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .logout-btn{background:#2A2A2A;border:1px solid #333;border-radius:8px;padding:5px 12px;font-size:12px;color:#aaa;cursor:pointer;font-family:'Heebo',sans-serif;transition:background .18s}
    .logout-btn:hover{background:#333;color:#fff}

    /* ══ NAV TABS ══ */
    .nav{background:#fff;border-bottom:1px solid #E8E4DC;padding:0 2rem;display:flex;gap:0}
    .nav-tab{padding:12px 18px;font-size:13px;font-weight:600;color:#AAA;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .18s;white-space:nowrap}
    .nav-tab:hover{color:#555}
    .nav-tab.active{color:#1A1A1A;border-bottom-color:#1A1A1A}
    .nav-tab.admin-tab{color:#6B7FDD}
    .nav-tab.admin-tab.active{color:#4F46E5;border-bottom-color:#4F46E5}

    /* ══ MAIN ══ */
    .main{padding:1.5rem 2rem;max-width:1200px;margin:0 auto}

    /* ══ DATE BAR ══ */
    .date-bar{background:#fff;border:1px solid #E8E4DC;border-radius:14px;padding:.75rem 1.2rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
    .date-text{font-size:14px;font-weight:700;color:#1A1A1A}
    .date-sub{font-size:11.5px;color:#AAA}
    .reset-badge{font-size:10.5px;background:#FEF9C3;color:#854D0E;padding:3px 10px;border-radius:999px;font-weight:600}

    /* ══ GROUP ══ */
    .group{background:#fff;border:1px solid #E8E4DC;border-radius:18px;overflow:hidden;margin-bottom:1.2rem;box-shadow:0 1px 6px rgba(0,0,0,.04)}
    .group-header{background:#FAFAF8;padding:.85rem 1.4rem;border-bottom:1px solid #F0EDE6;display:flex;align-items:center;justify-content:space-between}
    .group-title{font-size:14px;font-weight:800;color:#1A1A1A;display:flex;align-items:center;gap:8px}
    .group-stats{display:flex;align-items:center;gap:1rem}
    .group-stat{text-align:center}
    .group-stat-val{font-size:18px;font-weight:900;color:#1A1A1A;letter-spacing:-1px;line-height:1}
    .group-stat-label{font-size:9.5px;color:#AAA;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
    .group-stat-val.green{color:#16A34A}
    .group-stat-val.blue{color:#2563EB}

    /* ══ TABLE ══ */
    .tbl-wrap{overflow-x:auto}
    .tbl{width:100%;border-collapse:collapse}
    .tbl th{padding:.65rem 1.2rem;text-align:right;font-size:11px;font-weight:700;color:#AAA;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #F0EDE6;background:#FAFAF8;white-space:nowrap}
    .tbl td{padding:.6rem 1.2rem;border-bottom:1px solid #F8F6F2;vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:#FAFAF8}
    .agent-name{font-size:13.5px;font-weight:700;color:#1A1A1A}
    .agent-id{font-size:11px;color:#C0BDB6}
    .hours-input{width:70px;background:#F8F6F2;border:1.5px solid #E8E4DC;border-radius:8px;padding:5px 8px;font-size:14px;font-weight:700;text-align:center;font-family:'Heebo',sans-serif;color:#1A1A1A;outline:none;transition:border-color .18s}
    .hours-input:focus{border-color:#1A1A1A;background:#fff}
    .save-btn{background:#1A1A1A;color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;transition:background .18s;white-space:nowrap}
    .save-btn:hover{background:#333}
    .save-btn.saved{background:#16A34A}
    .activity-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:#F0EDE6;color:#666}

    /* ══ DIVIDER ══ */
    .divider{height:1px;background:#F0EDE6;margin:.5rem 1.2rem}

    /* ══ TOTALS ROW ══ */
    .totals-row{background:#F8F6F2;padding:.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between;border-top:1.5px solid #E8E4DC}
    .totals-label{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px}
    .totals-vals{display:flex;align-items:center;gap:1.5rem}
    .totals-item{text-align:center}
    .totals-num{font-size:20px;font-weight:900;color:#1A1A1A;letter-spacing:-1px}
    .totals-num.green{color:#16A34A}
    .totals-sub{font-size:10px;color:#AAA;font-weight:600}

    /* ══ ADMIN PANEL ══ */
    .admin-section{margin-bottom:1.5rem}
    .admin-section-title{font-size:13px;font-weight:800;color:#1A1A1A;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
    .admin-form{background:#fff;border:1px solid #E8E4DC;border-radius:14px;padding:1.2rem}
    .form-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:.75rem;align-items:end}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr auto;gap:.75rem;align-items:end}
    .form-group label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:4px}
    .form-input{width:100%;background:#F8F6F2;border:1.5px solid #E8E4DC;border-radius:10px;padding:9px 12px;font-size:13.5px;font-family:'Heebo',sans-serif;color:#1A1A1A;outline:none;transition:border-color .18s}
    .form-input:focus{border-color:#1A1A1A;background:#fff}
    .form-select{width:100%;background:#F8F6F2;border:1.5px solid #E8E4DC;border-radius:10px;padding:9px 12px;font-size:13.5px;font-family:'Heebo',sans-serif;color:#1A1A1A;outline:none;cursor:pointer}
    .add-btn{background:#1A1A1A;color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;white-space:nowrap;transition:background .18s;display:flex;align-items:center;gap:5px}
    .add-btn:hover{background:#333}
    .add-btn.green{background:#16A34A}
    .add-btn.green:hover{background:#15803D}

    .admin-table{width:100%;border-collapse:collapse;margin-top:.75rem}
    .admin-table th{padding:.6rem 1rem;text-align:right;font-size:11px;font-weight:700;color:#AAA;text-transform:uppercase;letter-spacing:.7px;border-bottom:1.5px solid #F0EDE6}
    .admin-table td{padding:.65rem 1rem;border-bottom:1px solid #F8F6F2;font-size:13px;color:#1A1A1A;vertical-align:middle}
    .admin-table tr:last-child td{border-bottom:none}
    .del-btn{background:#FEE2E2;color:#991B1B;border:none;border-radius:7px;padding:4px 10px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;transition:background .18s}
    .del-btn:hover{background:#FECACA}
    .edit-btn{background:#F0EDE6;color:#555;border:none;border-radius:7px;padding:4px 10px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;transition:background .18s;margin-left:4px}
    .edit-btn:hover{background:#E8E4DC}

    .tab-content{display:none}
    .tab-content.active{display:block}

    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    .loading-msg{text-align:center;color:#AAA;padding:2rem;font-size:13px}
    .empty-msg{text-align:center;color:#C0BDB6;padding:1.5rem;font-size:13px}
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 26 26" fill="none">
        <rect x="2" y="2" width="9" height="9" rx="2" fill="white" opacity=".9"/>
        <rect x="15" y="2" width="9" height="9" rx="2" fill="white" opacity=".6"/>
        <rect x="2" y="15" width="9" height="9" rx="2" fill="white" opacity=".6"/>
        <rect x="15" y="15" width="9" height="9" rx="2" fill="white" opacity=".3"/>
      </svg>
    </div>
    <div class="login-title">ניהול נציגים</div>
    <div class="login-sub">בחר את שמך והזן 4 ספרות אחרונות של ת״ז</div>
    <div class="manager-list" id="managerList">
      <div class="loading-msg">טוען מנהלים...</div>
    </div>
    <div class="pin-wrap">
      <input class="pin-input" id="pinInput" type="password" maxlength="4" placeholder="• • • •" inputmode="numeric"/>
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" onclick="doLogin()">כניסה</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none">
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">
        <svg viewBox="0 0 20 20" fill="none">
          <rect x="1" y="1" width="7" height="7" rx="1.5" fill="#1A1A1A" opacity=".9"/>
          <rect x="12" y="1" width="7" height="7" rx="1.5" fill="#1A1A1A" opacity=".6"/>
          <rect x="1" y="12" width="7" height="7" rx="1.5" fill="#1A1A1A" opacity=".6"/>
          <rect x="12" y="12" width="7" height="7" rx="1.5" fill="#1A1A1A" opacity=".3"/>
        </svg>
      </div>
      <div>
        <div class="header-title">ניהול נציגים — אדיר לוי</div>
        <div class="header-sub">עדכון שעות עבודה יומי</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-manager"><div class="dot-green"></div><span id="currentManagerName">—</span></div>
      <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout"></i> יציאה</button>
    </div>
  </div>

  <div class="nav" id="navTabs">
    <div class="nav-tab active" onclick="switchTab('hours')" id="tab-hours">⏱️ שעות עבודה</div>
    <div class="nav-tab" onclick="switchTab('agents')" id="tab-agents">👥 נציגים</div>
    <div class="nav-tab admin-tab" onclick="switchTab('admin')" id="tab-admin" style="display:none">⚙️ ניהול מנהלים</div>
  </div>

  <!-- HOURS TAB -->
  <div class="tab-content active main" id="content-hours">
    <div class="date-bar">
      <div>
        <div class="date-text" id="todayText">—</div>
        <div class="date-sub">תאריך עבודה נוכחי</div>
      </div>
      <div class="reset-badge">⟳ איפוס יומי ב-06:00</div>
    </div>

    <!-- GROUP 1: כללית + עובדים בריא + לאומית + מעוף -->
    <div class="group" id="group1"></div>

    <!-- GROUP 2: מאוחדת + כללית אקטיב (חוצץ) -->
    <div class="group" id="group2"></div>

    <!-- GROUP 3: פריפיט שירות + פריפיט מכירות (חוצץ) -->
    <div class="group" id="group3"></div>
  </div>

  <!-- AGENTS TAB -->
  <div class="tab-content main" id="content-agents">
    <div class="admin-section">
      <div class="admin-section-title"><i class="ti ti-user-plus"></i> הוספת נציג חדש</div>
      <div class="admin-form">
        <div class="form-row">
          <div class="form-group"><label>שם מלא</label><input class="form-input" id="newAgentName" placeholder="ישראל ישראלי"/></div>
          <div class="form-group"><label>ת״ז</label><input class="form-input" id="newAgentId" placeholder="000000000" maxlength="9"/></div>
          <div class="form-group"><label>פעילות</label>
            <select class="form-select" id="newAgentActivity">
              <option value="מובמנט">מובמנט (כללית + עובדים בריא + לאומית + מעוף)</option>
              <option value="מאוחדת">מאוחדת</option>
              <option value="כללית מאוחדת">כללית מאוחדת</option>
              <option value="פריפיט שירות">פריפיט שירות</option>
              <option value="פריפיט מכירות">פריפיט מכירות</option>
            </select>
          </div>
          <button class="add-btn green" onclick="addAgent()"><i class="ti ti-plus"></i> הוסף</button>
        </div>
      </div>
    </div>
    <div class="admin-form">
      <table class="admin-table" id="agentsTable">
        <thead><tr><th>שם</th><th>ת״ז</th><th>פעילות</th><th>פעיל</th><th>פעולות</th></tr></thead>
        <tbody id="agentsBody"><tr><td colspan="5" class="loading-msg">טוען...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ADMIN TAB (super admin only) -->
  <div class="tab-content main" id="content-admin">
    <div class="admin-section">
      <div class="admin-section-title"><i class="ti ti-user-shield"></i> הוספת מנהל חדש</div>
      <div class="admin-form">
        <div class="form-row-3">
          <div class="form-group"><label>שם מלא</label><input class="form-input" id="newMgrName" placeholder="שם המנהל"/></div>
          <div class="form-group"><label>4 ספרות ת״ז</label><input class="form-input" id="newMgrPin" placeholder="1234" maxlength="4" inputmode="numeric"/></div>
          <div class="form-group"><label>הרשאת פעילות</label>
            <select class="form-select" id="newMgrActivity">
              <option value="הכל">הכל</option>
              <option value="מובמנט">מובמנט</option>
              <option value="מאוחדת">מאוחדת</option>
              <option value="כללית מאוחדת">כללית מאוחדת</option>
              <option value="פריפיט שירות">פריפיט שירות</option>
              <option value="פריפיט מכירות">פריפיט מכירות</option>
            </select>
          </div>
          <button class="add-btn green" onclick="addManager()"><i class="ti ti-plus"></i> הוסף</button>
        </div>
      </div>
    </div>
    <div class="admin-form">
      <table class="admin-table" id="managersTable">
        <thead><tr><th>שם</th><th>הרשאה</th><th>פעולות</th></tr></thead>
        <tbody id="managersBody"><tr><td colspan="3" class="loading-msg">טוען...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://qyqkimpaffhizouuwdko.supabase.co/rest/v1';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5cWtpbXBhZmZoaXpvdXV3ZGtvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODUxMzUsImV4cCI6MjA5NDg2MTEzNX0.zlIo9vTfWKhpSHeTHqRExTnWtAuJLsZjK_Hlii1Oa_c';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const SUPER_ADMIN_NAME='אדיר לוי';

// Groups config
const GROUPS=[
  {
    id:'group1',
    title:'מובמנט',
    icon:'🏥',
    subGroups:[
      {label:'מובמנט', activities:['מובמנט']}
    ]
  },
  {
    id:'group2',
    title:'מאוחדת + כללית',
    icon:'🏢',
    subGroups:[
      {label:'מאוחדת', activities:['מאוחדת']},
      {label:'כללית מאוחדת', activities:['כללית מאוחדת']}
    ]
  },
  {
    id:'group3',
    title:'פריפיט',
    icon:'💪',
    subGroups:[
      {label:'פריפיט שירות', activities:['פריפיט שירות']},
      {label:'פריפיט מכירות', activities:['פריפיט מכירות']}
    ]
  }
];

let currentManager=null;
let allAgents=[];
let allHours={};

// ── Helpers ──
function sb(path,opts={}){
  return fetch(SB_URL+path,{...opts,headers:{...H,...(opts.headers||{})}}).then(r=>r.json());
}
function toast(msg,ms=2000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}
function getToday(){
  const n=new Date();
  // אם לפני 06:00 — עדיין "אתמול" לוגית
  if(n.getHours()<6){
    const y=new Date(n.getTime()-24*60*60*1000);
    return y.toISOString().slice(0,10);
  }
  return n.toISOString().slice(0,10);
}
function formatDateHe(d){
  const dt=new Date(d+'T12:00:00');
  const days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const months=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return 'יום '+days[dt.getDay()]+' · '+dt.getDate()+' '+months[dt.getMonth()]+' '+dt.getFullYear();
}

// ── LOGIN ──
async function loadManagers(){
  const data=await sb('/managers?select=*&order=name.asc');
  const list=document.getElementById('managerList');
  if(!Array.isArray(data)||!data.length){list.innerHTML='<div class="empty-msg">אין מנהלים</div>';return;}
  list.innerHTML=data.map(m=>`
    <button class="manager-btn" onclick="selectManager(this,'${m.id}','${m.name}','${m.activity}')" data-id="${m.id}">
      <span>${m.name}</span>
      <span class="act-tag">${m.activity}</span>
    </button>`).join('');
}

function selectManager(el,id,name,activity){
  document.querySelectorAll('.manager-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  el._mgr={id,name,activity};
  document.getElementById('pinInput').focus();
}

async function doLogin(){
  const selected=document.querySelector('.manager-btn.selected');
  if(!selected){document.getElementById('loginError').textContent='בחר מנהל תחילה';return;}
  const pin=document.getElementById('pinInput').value.trim();
  if(pin.length!==4){document.getElementById('loginError').textContent='הזן 4 ספרות';return;}
  const mgr=selected._mgr;
  // verify pin
  const data=await sb('/managers?id=eq.'+mgr.id+'&id_last4=eq.'+pin+'&select=*');
  if(!Array.isArray(data)||!data.length){
    document.getElementById('pinInput').classList.add('error');
    document.getElementById('loginError').textContent='ספרות שגויות';
    setTimeout(()=>document.getElementById('pinInput').classList.remove('error'),400);
    return;
  }
  currentManager=data[0];
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('app').style.display='block';
  document.getElementById('currentManagerName').textContent=currentManager.name;
  // super admin
  if(currentManager.name===SUPER_ADMIN_NAME){
    document.getElementById('tab-admin').style.display='';
  }
  initApp();
}

function doLogout(){
  currentManager=null;
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('app').style.display='none';
  document.getElementById('pinInput').value='';
  document.getElementById('loginError').textContent='';
  document.querySelectorAll('.manager-btn').forEach(b=>b.classList.remove('selected'));
}

// ── TABS ──
function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('content-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='agents') loadAgentsTable();
  if(tab==='admin') loadManagersTable();
}

// ── INIT ──
async function initApp(){
  const today=getToday();
  document.getElementById('todayText').textContent=formatDateHe(today);
  await loadAllAgents();
  await loadTodayHours(today);
  renderGroups(today);
}

async function loadAllAgents(){
  const data=await sb('/agents_roster?select=*&active=eq.true&order=activity.asc,name.asc');
  allAgents=Array.isArray(data)?data:[];
}

async function loadTodayHours(today){
  const data=await sb('/work_hours?select=*&work_date=eq.'+today);
  allHours={};
  if(Array.isArray(data)) data.forEach(r=>{allHours[r.agent_id]=r;});
}

// ── RENDER GROUPS ──
function renderGroups(today){
  GROUPS.forEach(g=>{
    const el=document.getElementById(g.id);
    // filter by manager activity
    let groupAgents=allAgents;
    if(currentManager.activity!=='הכל'){
      groupAgents=allAgents.filter(a=>a.activity===currentManager.activity);
    }
    // get agents for this group
    const allActivities=g.subGroups.flatMap(s=>s.activities);
    const grpAgents=groupAgents.filter(a=>allActivities.includes(a.activity));
    if(!grpAgents.length){el.style.display='none';return;}
    el.style.display='';

    let totalHours=0;
    grpAgents.forEach(a=>{totalHours+=(allHours[a.id]?.hours||0);});
    const std=grpAgents.length*9;
    const pct=std>0?(totalHours/std*100).toFixed(0):0;

    let html=`<div class="group-header">
      <div class="group-title">${g.icon} ${g.title}</div>
      <div class="group-stats">
        <div class="group-stat"><div class="group-stat-val">${grpAgents.length}</div><div class="group-stat-label">נציגים</div></div>
        <div class="group-stat"><div class="group-stat-val green">${totalHours}</div><div class="group-stat-label">שעות</div></div>
        <div class="group-stat"><div class="group-stat-val blue">${pct}%</div><div class="group-stat-label">תקן</div></div>
      </div>
    </div>`;

    g.subGroups.forEach((sg,si)=>{
      const sgAgents=grpAgents.filter(a=>sg.activities.includes(a.activity));
      if(!sgAgents.length) return;
      if(si>0) html+=`<div class="divider"></div>`;

      let sgHours=0;
      sgAgents.forEach(a=>{sgHours+=(allHours[a.id]?.hours||0);});
      const sgStd=sgAgents.length*9;
      const sgPct=sgStd>0?(sgHours/sgStd*100).toFixed(1):0;

      html+=`<div style="padding:.4rem 0">
        <div style="padding:.3rem 1.2rem;font-size:11px;font-weight:700;color:#AAA;letter-spacing:.8px;text-transform:uppercase">${sg.label}</div>
        <table class="tbl"><thead><tr><th>שם נציג</th><th>פעילות</th><th>שעות עבודה</th><th>שמירה</th></tr></thead><tbody>`;

      sgAgents.forEach(a=>{
        const hrs=allHours[a.id]?.hours||0;
        html+=`<tr>
          <td><div class="agent-name">${a.name}</div><div class="agent-id">${a.id_number}</div></td>
          <td><span class="activity-tag">${a.activity}</span></td>
          <td><input class="hours-input" id="h_${a.id}" type="number" min="0" max="24" step="0.5" value="${hrs}" onkeydown="if(event.key==='Enter')saveHours('${a.id}','${a.name}','${a.activity}','${today}')"/></td>
          <td><button class="save-btn" id="btn_${a.id}" onclick="saveHours('${a.id}','${a.name}','${a.activity}','${today}')">שמור</button></td>
        </tr>`;
      });

      html+=`</tbody></table>`;
      html+=`<div class="totals-row">
        <span class="totals-label">סה״כ ${sg.label}</span>
        <div class="totals-vals">
          <div class="totals-item"><div class="totals-num green">${sgHours}</div><div class="totals-sub">שעות</div></div>
          <div class="totals-item"><div class="totals-num">${sgStd}</div><div class="totals-sub">תקן (×9)</div></div>
          <div class="totals-item"><div class="totals-num blue">${sgPct}%</div><div class="totals-sub">ביצוע</div></div>
        </div>
      </div></div>`;
    });

    el.innerHTML=html;
  });
}

// ── SAVE HOURS ──
async function saveHours(agentId,agentName,activity,today){
  const inp=document.getElementById('h_'+agentId);
  const btn=document.getElementById('btn_'+agentId);
  const hrs=parseFloat(inp.value)||0;
  btn.textContent='שומר...';
  try{
    const existing=allHours[agentId];
    let res;
    if(existing){
      res=await fetch(SB_URL+'/work_hours?id=eq.'+existing.id,{
        method:'PATCH',headers:{...H,'Prefer':'return=representation'},
        body:JSON.stringify({hours:hrs,updated_by:currentManager.name,updated_at:new Date().toISOString()})
      });
    } else {
      res=await fetch(SB_URL+'/work_hours',{
        method:'POST',headers:{...H,'Prefer':'return=representation'},
        body:JSON.stringify({agent_id:agentId,agent_name:agentName,activity,work_date:today,hours:hrs,updated_by:currentManager.name})
      });
    }
    const data=await res.json();
    if(Array.isArray(data)&&data.length){
      allHours[agentId]=data[0];
      btn.textContent='✓';btn.classList.add('saved');
      setTimeout(()=>{btn.textContent='שמור';btn.classList.remove('saved');},1500);
      // re-render totals
      await loadTodayHours(today);
      renderGroups(today);
    }
  }catch(e){btn.textContent='שמור';toast('שגיאה בשמירה');}
}

// ── AGENTS ADMIN ──
async function loadAgentsTable(){
  const data=await sb('/agents_roster?select=*&order=activity.asc,name.asc');
  const tbody=document.getElementById('agentsBody');
  if(!Array.isArray(data)||!data.length){tbody.innerHTML='<tr><td colspan="5" class="empty-msg">אין נציגים</td></tr>';return;}
  tbody.innerHTML=data.map(a=>`<tr>
    <td style="font-weight:700">${a.name}</td>
    <td style="color:#888">${a.id_number}</td>
    <td><span class="activity-tag">${a.activity}</span></td>
    <td><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:${a.active?'#DCFCE7':'#FEE2E2'};color:${a.active?'#166534':'#991B1B'}">${a.active?'פעיל':'לא פעיל'}</span></td>
    <td>
      <button class="edit-btn" onclick="toggleAgent('${a.id}',${a.active})">${a.active?'השבת':'הפעל'}</button>
      <button class="del-btn" onclick="deleteAgent('${a.id}','${a.name}')">מחק</button>
    </td>
  </tr>`).join('');
}

async function addAgent(){
  const name=document.getElementById('newAgentName').value.trim();
  const idNum=document.getElementById('newAgentId').value.trim();
  const activity=document.getElementById('newAgentActivity').value;
  if(!name||!idNum){toast('מלא שם ות״ז');return;}
  await fetch(SB_URL+'/agents_roster',{method:'POST',headers:H,body:JSON.stringify({name,id_number:idNum,activity,active:true})});
  document.getElementById('newAgentName').value='';
  document.getElementById('newAgentId').value='';
  toast('נציג נוסף ✓');
  loadAgentsTable();
  loadAllAgents();
}

async function toggleAgent(id,active){
  await fetch(SB_URL+'/agents_roster?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify({active:!active})});
  toast((active?'הנציג הושבת':'הנציג הופעל')+' ✓');
  loadAgentsTable();
}

async function deleteAgent(id,name){
  if(!confirm('למחוק את '+name+'?')) return;
  await fetch(SB_URL+'/agents_roster?id=eq.'+id,{method:'DELETE',headers:H});
  toast('נמחק ✓');
  loadAgentsTable();
  loadAllAgents();
}

// ── MANAGERS ADMIN ──
async function loadManagersTable(){
  const data=await sb('/managers?select=*&order=name.asc');
  const tbody=document.getElementById('managersBody');
  if(!Array.isArray(data)||!data.length){tbody.innerHTML='<tr><td colspan="3" class="empty-msg">אין מנהלים</td></tr>';return;}
  tbody.innerHTML=data.map(m=>`<tr>
    <td style="font-weight:700">${m.name}</td>
    <td><span class="activity-tag">${m.activity}</span></td>
    <td>
      <button class="del-btn" onclick="deleteManager('${m.id}','${m.name}')"${m.name===SUPER_ADMIN_NAME?' disabled style="opacity:.4;cursor:not-allowed"':''}>מחק</button>
    </td>
  </tr>`).join('');
}

async function addManager(){
  const name=document.getElementById('newMgrName').value.trim();
  const pin=document.getElementById('newMgrPin').value.trim();
  const activity=document.getElementById('newMgrActivity').value;
  if(!name||pin.length!==4){toast('מלא שם ו-4 ספרות ת״ז');return;}
  await fetch(SB_URL+'/managers',{method:'POST',headers:H,body:JSON.stringify({name,id_last4:pin,activity,active:true})});
  document.getElementById('newMgrName').value='';
  document.getElementById('newMgrPin').value='';
  toast('מנהל נוסף ✓');
  loadManagersTable();
  // reload login list
  loadManagers();
}

async function deleteManager(id,name){
  if(name===SUPER_ADMIN_NAME){toast('לא ניתן למחוק מנהל עליון');return;}
  if(!confirm('למחוק את '+name+'?')) return;
  await fetch(SB_URL+'/managers?id=eq.'+id,{method:'DELETE',headers:H});
  toast('נמחק ✓');
  loadManagersTable();
}

// ── INIT ──
document.getElementById('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
loadManagers();
</script>
